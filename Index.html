<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Protom - Orçamentos</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --yellow-main: #FFCB05;
            --yellow-light: #FFFBF0;
            --orange-main: #F47920;
            --orange-light: #FFF5EC;
            --text-dark: #333333;
            --text-gray: #666666;
            --border-color: #E0E0E0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        
        body { background-color: #f7f7f7; color: var(--text-dark); display: flex; justify-content: center; }

        .app-container {
            width: 100%;
            max-width: 480px; /* Mobile View */
            background-color: #ffffff;
            min-height: 100vh;
            padding: 20px 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 24px; color: var(--yellow-main); }
        .header h1 span { color: var(--orange-main); }
        .header p { font-size: 12px; color: var(--text-gray); }

        /* Card Styles inspired by mockups */
        .card {
            border-radius: 12px;
            padding: 20px 15px;
            margin-bottom: 20px;
            position: relative;
        }
        
        .card-yellow { border: 2px solid var(--yellow-main); background-color: var(--yellow-light); }
        .card-orange { border: 2px solid var(--orange-main); background-color: var(--orange-light); }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .card-yellow .card-title { color: var(--text-dark); }
        .card-orange .card-title { color: var(--text-dark); }

        /* Input Styles */
        .input-group {
            position: relative;
            margin-bottom: 15px;
            background: transparent;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 5px;
            margin-left: 5px;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--yellow-main);
            border-radius: 8px;
            font-size: 14px;
            background-color: transparent;
            outline: none;
        }
        
        .card-orange .input-group input, .card-orange .input-group select {
            border-color: var(--orange-main);
        }

        .input-group input:focus, .input-group select:focus {
            box-shadow: 0 0 0 2px rgba(255, 203, 5, 0.3);
        }

        /* Items Section */
        .item-row {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
        }
        .btn-add {
            background: transparent;
            color: var(--orange-main);
            border: 2px dashed var(--orange-main);
            padding: 10px;
            width: 100%;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 15px;
        }

        /* Buttons */
        .btn-primary {
            background-color: var(--yellow-main);
            color: #fff;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 6px rgba(255, 203, 5, 0.3);
            margin-top: 10px;
        }
        
        .btn-primary:active { transform: translateY(2px); }
        .btn-primary:disabled { background-color: #ccc; cursor: not-allowed; box-shadow: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>📢 <span>PRO</span>TOM</h1>
        <p>Projetos Sonoros - Gerador de Orçamentos</p>
    </div>

    <form id="orcamentoForm">
        
        <div class="card card-yellow">
            <h2 class="card-title">1. Informações Básicas</h2>
            
            <div class="input-group">
                <label>Agência</label>
                <select id="agencia" required onchange="carregarClientes()">
                    <option value="">Carregando agências...</option>
                </select>
            </div>

            <div class="input-group">
                <label>Cliente</label>
                <select id="cliente" required>
                    <option value="">Selecione uma agência primeiro</option>
                </select>
            </div>

            <div class="input-group">
                <label>Campanha</label>
                <input type="text" id="campanha" placeholder="Ex: TOP CURSOS 2026.1" required>
            </div>
        </div>

        <div class="card card-orange">
            <h2 class="card-title">2. Veiculação</h2>
            
            <div class="input-group">
                <label>Praça</label>
                <input type="text" id="praca" placeholder="Ex: BAHIA E SERGIPE" required>
            </div>
            <div class="input-group">
                <label>Período</label>
                <input type="text" id="periodo" placeholder="Ex: 1 MÊS" required>
            </div>
            <div class="input-group">
                <label>Meios</label>
                <input type="text" id="meios" placeholder="Ex: RÁDIO, CARRO DE SOM" required>
            </div>
        </div>

        <div class="card card-yellow">
            <h2 class="card-title">3. Itens do Orçamento</h2>
            
            <div id="itemsContainer">
                <div class="item-row">
                    <div class="input-group"><label>Peça / Duração</label><input type="text" class="item-peca" placeholder="Ex: Spot 30s" required></div>
                    <div class="input-group"><label>Descrição</label><input type="text" class="item-desc" placeholder="Ex: Locução Standard..." required></div>
                    <div style="display: flex; gap: 10px;">
                        <div class="input-group" style="flex: 2;"><label>Valor Unit. (R$)</label><input type="number" step="0.01" class="item-valor" placeholder="1250.00" required></div>
                        <div class="input-group" style="flex: 1;"><label>Qtde.</label><input type="number" class="item-qtde" value="1" required></div>
                    </div>
                </div>
            </div>
            
            <button type="button" class="btn-add" id="btnAddItem">+ ADICIONAR ITEM (Max 9)</button>
        </div>

        <div class="card card-orange">
            <h2 class="card-title">4. Condições Comerciais</h2>
            
            <div class="input-group">
                <label>Condição de Pagamento</label>
                <input type="text" id="condicao" value="1X Sem Juros" required>
            </div>
            <div class="input-group">
                <label>Prazo de Pagamento</label>
                <input type="text" id="prazoPag" value="30 DIAS" required>
            </div>
            <div class="input-group">
                <label>Validade da Proposta</label>
                <input type="text" id="validade" value="10 DIAS" required>
            </div>
            <div class="input-group">
                <label>Prazo de Entrega</label>
                <input type="text" id="prazoEnt" value="A COMBINAR" required>
            </div>
        </div>

        <button type="submit" class="btn-primary" id="btnSubmit">GERAR ORÇAMENTO</button>

    </form>
</div>

<script>
    // ----------------------------------------------------------------------
    // 1. CONFIGURAÇÃO DA API DO GOOGLE DRIVE
    // ----------------------------------------------------------------------
    // ATENÇÃO: Cole aqui a URL gerada no Google Apps Script (Implantar > App da Web)
    const URL_SCRIPT = 'https://script.google.com/macros/s/AKfycbzfeflsrPywqxil3eoPHKzjMdSKh_cTKVXQCLEkZLySmGaOrXmVIv9PNIHYxshuv-40/exec'; 

    // ----------------------------------------------------------------------
    // 2. BUSCA DINÂMICA DE AGÊNCIAS E CLIENTES
    // ----------------------------------------------------------------------
    
    // Assim que a tela carregar, busca as Agências
    window.onload = () => {
        if(URL_SCRIPT === 'https://script.google.com/macros/s/AKfycbzfeflsrPywqxil3eoPHKzjMdSKh_cTKVXQCLEkZLySmGaOrXmVIv9PNIHYxshuv-40/exec') {
            document.getElementById('agencia').innerHTML = '<option value="">ERRO: Configure a URL_SCRIPT no código.</option>';
            return;
        }

        fetch(`${URL_SCRIPT}?rota=getAgencias`)
            .then(res => res.json())
            .then(dados => {
                let html = '<option value="">Selecione a Agência</option>';
                dados.forEach(n => html += `<option value="${n}">${n}</option>`);
                document.getElementById('agencia').innerHTML = html;
            })
            .catch(err => {
                console.error("Erro ao buscar agências:", err);
                document.getElementById('agencia').innerHTML = '<option value="">Erro ao carregar do Drive</option>';
            });
    };

    // Quando a agência é selecionada, busca os clientes correspondentes
    function carregarClientes() {
        const ag = document.getElementById('agencia').value;
        const cliSelect = document.getElementById('cliente');
        
        if (!ag) {
            cliSelect.innerHTML = '<option value="">Selecione uma agência primeiro</option>';
            return;
        }

        cliSelect.innerHTML = '<option>Buscando clientes no Drive...</option>';

        fetch(`${URL_SCRIPT}?rota=getClientes&agencia=${encodeURIComponent(ag)}`)
            .then(res => res.json())
            .then(dados => {
                let html = '<option value="">Selecione o Cliente</option>';
                dados.forEach(n => html += `<option value="${n}">${n}</option>`);
                cliSelect.innerHTML = html;
            })
            .catch(err => {
                console.error("Erro ao buscar clientes:", err);
                cliSelect.innerHTML = '<option value="">Erro ao carregar do Drive</option>';
            });
    }

    // ----------------------------------------------------------------------
    // 3. LÓGICA DE ITENS E SUBMISSÃO (MANTIDA DO ORIGINAL)
    // ----------------------------------------------------------------------
    const btnAddItem = document.getElementById('btnAddItem');
    const itemsContainer = document.getElementById('itemsContainer');
    let itemCount = 1;

    btnAddItem.addEventListener('click', () => {
        if (itemCount >= 9) {
            alert("O limite máximo é de 9 itens por orçamento.");
            return;
        }
        
        const newItem = document.createElement('div');
        newItem.className = 'item-row';
        newItem.innerHTML = `
            <div class="input-group"><label>Peça / Duração</label><input type="text" class="item-peca" required></div>
            <div class="input-group"><label>Descrição</label><input type="text" class="item-desc" required></div>
            <div style="display: flex; gap: 10px;">
                <div class="input-group" style="flex: 2;"><label>Valor Unit. (R$)</label><input type="number" step="0.01" class="item-valor" required></div>
                <div class="input-group" style="flex: 1;"><label>Qtde.</label><input type="number" class="item-qtde" value="1" required></div>
            </div>
        `;
        itemsContainer.appendChild(newItem);
        itemCount++;
    });

    document.getElementById('orcamentoForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const btnSubmit = document.getElementById('btnSubmit');
        btnSubmit.innerText = 'ENVIANDO PARA O DRIVE...';
        btnSubmit.disabled = true;

        const itens = [];
        document.querySelectorAll('.item-row').forEach(row => {
            itens.push({
                peca: row.querySelector('.item-peca').value,
                desc: row.querySelector('.item-desc').value,
                valor: row.querySelector('.item-valor').value,
                qtde: row.querySelector('.item-qtde').value
            });
        });

        const formData = {
            rota: 'gerarPDF', // Essa rota precisará ser tratada no seu Google Script (doPost)
            agencia: document.getElementById('agencia').value,
            cliente: document.getElementById('cliente').value,
            campanha: document.getElementById('campanha').value,
            praca: document.getElementById('praca').value,
            periodo: document.getElementById('periodo').value,
            meios: document.getElementById('meios').value,
            condicao: document.getElementById('condicao').value,
            prazoPag: document.getElementById('prazoPag').value,
            validade: document.getElementById('validade').value,
            prazoEnt: document.getElementById('prazoEnt').value,
            itens: itens
        };

        // O envio real acontecerá via POST (quando você configurar o doPost no GAS)
        fetch(URL_SCRIPT, {
            method: 'POST',
            body: JSON.stringify(formData)
        })
        .then(res => res.json())
        .then(response => {
            alert('Orçamento gerado com sucesso! Verifique a pasta do cliente.');
            btnSubmit.innerText = 'GERAR ORÇAMENTO';
            btnSubmit.disabled = false;
        })
        .catch(err => {
            // Se o POST não estiver configurado no GAS, o fetch via no-cors falha silenciosamente
            // Mas para testes, vamos avisar que os dados foram capturados.
            console.error("Erro ou CORS block:", err);
            alert("Em produção, isso fará um POST para gerar o PDF. Verifique o console para ver os dados enviados.");
            console.log("Dados enviados:", formData);
            btnSubmit.innerText = 'GERAR ORÇAMENTO';
            btnSubmit.disabled = false;
        });
    });
</script>

</body>
</html>
