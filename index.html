<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Protom - Orçamentos</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --yellow-main: #FFCB05; --yellow-light: #FFFBF0; --orange-main: #F47920; --orange-light: #FFF5EC;
            --text-dark: #333333; --text-gray: #666666; --border-color: #E0E0E0; --green-btn: #4CAF50;
            --blue-btn: #2196F3; --red-btn: #F44336;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: #f7f7f7; color: var(--text-dark); display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 480px; background-color: #ffffff; min-height: 100vh; padding: 20px 15px; box-shadow: 0 0 20px rgba(0,0,0,0.05); }

        .header { text-align: center; margin-bottom: 20px; }
        .header img { max-height: 60px; margin-bottom: 5px; object-fit: contain; }
        .header h1 { font-size: 24px; color: var(--yellow-main); margin-bottom: 5px; }
        .header h1 span { color: var(--orange-main); }
        .header p { font-size: 12px; color: var(--text-gray); font-weight: 600; }

        /* TOP ACTION BAR */
        .top-actions { display: flex; gap: 8px; margin-bottom: 20px; }
        .top-btn { flex: 1; padding: 10px 5px; border-radius: 8px; border: none; font-size: 12px; font-weight: 700; color: #fff; cursor: pointer; text-transform: uppercase; }
        .btn-limpar { background-color: var(--text-gray); }
        .btn-abrir { background-color: var(--blue-btn); }
        .btn-ver { background-color: var(--green-btn); }

        .card { border-radius: 12px; padding: 20px 15px; margin-bottom: 20px; }
        .card-yellow { border: 2px solid var(--yellow-main); background-color: var(--yellow-light); }
        .card-orange { border: 2px solid var(--orange-main); background-color: var(--orange-light); }
        .card-gray { border: 2px solid #ccc; background-color: #f9f9f9; }
        
        .card-title { font-size: 16px; font-weight: 700; margin-bottom: 15px; }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px; margin-left: 5px; }
        .input-row { display: flex; gap: 8px; align-items: center; }
        .input-group input, .input-group select { width: 100%; padding: 12px; border: 1px solid var(--yellow-main); border-radius: 8px; font-size: 14px; outline: none; flex: 1; }
        
        .input-group input[type="text"]:not(.item-desc):not(.item-title-case):not(.item-data):not(.item-valor), 
        .input-group input[list]:not(.item-desc):not(.item-title-case):not(.item-data) { text-transform: uppercase; }

        .btn-small { background-color: var(--green-btn); color: #fff; border: none; border-radius: 8px; width: 80px; padding: 12px 0; font-size: 12px; font-weight: 700; cursor: pointer; }
        
        .fake-input { width: 100%; padding: 12px; border: 1px solid var(--orange-main); border-radius: 8px; font-size: 14px; background-color: #fff; min-height: 46px; cursor: pointer; color: var(--text-gray); display: flex; align-items: center; }
        .fake-input.preenchido { color: var(--text-dark); }
        
        /* CORREÇÃO DO MENU MEIOS */
        .dropdown-meios { 
            border: 1px solid var(--orange-main); border-top: none; border-radius: 0 0 8px 8px; 
            padding: 15px 15px 65px 15px; background: #FFF5EC; margin-top: -5px; display: none; 
            position: relative; max-height: 250px; overflow-y: auto; 
        }
        .meio-checkbox-item { display: flex; align-items: center; margin-bottom: 10px; font-size: 14px; color: var(--text-dark); justify-content: flex-start; }
        .meio-checkbox-item input { margin-right: 10px; width: 20px; height: 20px; accent-color: var(--orange-main); flex-shrink: 0;}
        .btn-meios-ok { position: absolute; bottom: 10px; left: 15px; width: calc(100% - 30px); margin: 0; min-height: 40px;}

        .item-row { background: #fff; border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; margin-bottom: 10px; position: relative;}
        .btn-remove-item { position: absolute; top: 5px; right: 5px; background: var(--red-btn); color: white; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 10px; cursor: pointer;}
        
        .btn-add { background: transparent; color: var(--orange-main); border: 2px dashed var(--orange-main); padding: 10px; width: 100%; border-radius: 8px; font-weight: 600; cursor: pointer; margin-bottom: 15px; }
        .total-box { text-align: right; font-size: 20px; font-weight: 700; color: var(--orange-main); }

        .btn-action {
            color: #fff; border: none; padding: 15px; width: 100%; min-height: 55px;
            border-radius: 30px; font-size: 14px; font-weight: 700; cursor: pointer; margin-bottom: 12px;
            display: flex; align-items: center; justify-content: center; text-transform: uppercase;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.2s;
        }
        .btn-action:active { transform: translateY(2px); }
        .btn-action:disabled { background-color: #ccc; cursor: not-allowed; box-shadow: none; }
        
        .bg-green { background-color: var(--green-btn); }
        .bg-blue { background-color: var(--blue-btn); }
        .bg-wpp { background-color: #25D366; }

        /* MODAL CORRIGIDO COM BOTÃO FECHAR FLUTUANTE */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-box { background: #fff; width: 90%; max-width: 400px; border-radius: 12px; padding: 20px; max-height: 80vh; overflow-y: auto; position: relative; padding-top: 50px;}
        .file-item { padding: 10px; border-bottom: 1px solid #eee; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .file-item:hover { background: #f0f0f0; }
        .btn-close-floating { position: absolute; top: 10px; right: 10px; background: var(--red-btn); color: #fff; border: none; padding: 5px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 12px; z-index: 10;}
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <img src="logo_protom.png" alt="Protom Logo" id="logoImg" onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='block';">
        <h1 id="logoFallback" style="display:none;">📢 <span>PRO</span>TOM</h1>
        <p>Orçamento Publicidade - Mobile</p>
    </div>

    <div class="top-actions">
        <button class="top-btn btn-limpar" onclick="limparCampos()">Limpar</button>
        <button class="top-btn btn-abrir" onclick="abrirModalArquivos('abrir')">Abrir</button>
        <button class="top-btn btn-ver" onclick="abrirModalArquivos('ver')">Ver Pasta</button>
    </div>

    <form id="orcamentoForm">
        
        <div class="card card-yellow">
            <h2 class="card-title">1. Informações Básicas</h2>
            <div class="input-group">
                <label>Agência</label>
                <div class="input-row">
                    <input list="lista-agencias" id="agencia" placeholder="Carregando..." required onchange="carregarClientes()">
                    <button type="button" class="btn-small" onclick="criarNovaAgencia()">+ Agência</button>
                </div>
                <datalist id="lista-agencias"></datalist>
            </div>
            <div class="input-group">
                <label>Cliente</label>
                <div class="input-row">
                    <input list="lista-clientes" id="cliente" placeholder="Selecione a agência" required>
                    <button type="button" class="btn-small" onclick="criarNovoCliente()">+ Cliente</button>
                </div>
                <datalist id="lista-clientes"></datalist>
            </div>
            <div class="input-group">
                <label>Campanha</label>
                <input type="text" id="campanha" required>
            </div>
        </div>

        <div class="card card-orange">
            <h2 class="card-title">2. Veiculação</h2>
            <div class="input-group"><label>Praça</label><input list="lista-praca" id="praca" required><datalist id="lista-praca"></datalist></div>
            <div class="input-group"><label>Período</label><input list="lista-periodo" id="periodo" required><datalist id="lista-periodo"></datalist></div>
            <div class="input-group">
                <label>Meios</label>
                <div id="meios-display" class="fake-input" onclick="toggleMeios()">Selecione...</div>
                <div id="meios-dropdown" class="dropdown-meios">
                    <div id="meios-lista"></div>
                    <div class="input-row" style="margin-top: 15px; margin-bottom: 20px;">
                        <input type="text" id="novo-meio" placeholder="Add novo...">
                        <button type="button" class="btn-small" style="background-color: var(--orange-main);" onclick="adicionarMeio()">+ Add</button>
                    </div>
                    <button type="button" class="btn-action bg-blue btn-meios-ok" onclick="toggleMeios()">OK</button>
                </div>
                <input type="hidden" id="meios" required>
            </div>
        </div>

        <div class="card card-yellow">
            <h2 class="card-title">3. Itens do Orçamento</h2>
            <datalist id="lista-peca"></datalist>
            <datalist id="lista-desc"></datalist>
            <div id="itemsContainer"></div>
            <button type="button" class="btn-add" id="btnAddItem">+ ADICIONAR ITEM</button>
            <div class="total-box">TOTAL: R$ <span id="valorTotal">0,00</span></div>
        </div>

        <div class="card card-orange">
            <h2 class="card-title">4. Condições Comerciais</h2>
            <div class="input-group"><label>Cond. Pagamento</label><input list="lista-condicao" id="condicao" required><datalist id="lista-condicao"></datalist></div>
            <div class="input-group"><label>Prazo Pagamento</label><input list="lista-prazoPag" id="prazoPag" required><datalist id="lista-prazoPag"></datalist></div>
            <div class="input-group"><label>Validade Proposta</label><input list="lista-validade" id="validade" required><datalist id="lista-validade"></datalist></div>
            <div class="input-group"><label>Prazo Entrega</label><input type="text" id="prazoEnt" required></div>
        </div>

        <div class="card card-yellow">
            <h2 class="card-title">5. Dados Complementares</h2>
            <div class="input-group">
                <label>Nº Orçamento (Gerado/Carregado)</label>
                <input type="text" id="numOrcamento" readonly style="background-color: #eee; border-color: #ccc;">
            </div>
            
            <div class="input-group">
                <label>Se for orçamento de ajuste, marque a caixa abaixo.</label>
                <div style="background-color: #fff; border: 1px solid var(--yellow-main); border-radius: 8px; padding: 12px; display: flex; justify-content: center; align-items: center;">
                    <input type="checkbox" id="isAjuste" style="width: 25px; height: 25px; accent-color: var(--orange-main); margin: 0; cursor: pointer;">
                </div>
            </div>

            <div class="input-group"><label>Data</label><input type="text" id="dataAtual" class="item-data" required></div>
            <div class="input-group"><label>Nome do Contato</label><input type="text" id="nomeContato" class="item-title-case" required></div>
            <div class="input-group"><label>Responsável</label><input list="lista-responsavel" id="responsavel" required><datalist id="lista-responsavel"></datalist></div>
        </div>

        <div class="card card-gray">
            <h2 class="card-title">6. Gerar e Enviar</h2>
            <button type="button" class="btn-action bg-green" id="btnGerarPdf" onclick="gerarDocumentoPDF()">GERAR ORÇAMENTO (PDF)</button>
            <button type="button" class="btn-action bg-blue" id="btnEmail" onclick="enviarViaEmail()">ENVIAR PDF VIA GMAIL (RASCUNHO)</button>
            <button type="button" class="btn-action bg-wpp" id="btnWpp" onclick="compartilharPDF()">COMPARTILHAR PDF (WHATSAPP)</button>
        </div>

    </form>
</div>

<div class="modal-overlay" id="modalArquivos">
    <div class="modal-box">
        <button class="btn-close-floating" onclick="fecharModal()">X FECHAR</button>
        <h3 id="modalTitle" style="margin-bottom: 15px; color: var(--orange-main);">Arquivos</h3>
        <div id="modalList" style="margin-bottom: 15px;">Carregando...</div>
    </div>
</div>

<script>
    const URL_SCRIPT = 'https://script.google.com/macros/s/AKfycbzfeflsrPywqxil3eoPHKzjMdSKh_cTKVXQCLEkZLySmGaOrXmVIv9PNIHYxshuv-40/exec'; 
    let linkPdfGerado = "";
    let nomeArquivoGerado = "";

    // --- MASCARA DE MOEDA (NOVO) ---
    function formatarMoeda(input) {
        let v = input.value.replace(/\D/g, '');
        if (v === '') { input.value = ''; calcularTotal(); return; }
        v = (v / 100).toFixed(2) + '';
        v = v.replace(".", ",");
        v = v.replace(/(\d)(?=(\d{3})+(?!\d))/g, '$1.');
        input.value = v;
        calcularTotal();
    }

    function floatParaMoeda(num) {
        if (!num) return '';
        let v = parseFloat(num).toFixed(2);
        v = v.replace(".", ",");
        v = v.replace(/(\d)(?=(\d{3})+(?!\d))/g, '$1.');
        return v;
    }

    function parseMoeda(str) {
        if (!str) return 0;
        if (typeof str === 'number') return str;
        return parseFloat(str.replace(/\./g, '').replace(',', '.'));
    }

    // --- FORMATAÇÕES COM PROTEÇÃO MOBILE ---
    document.addEventListener('input', function(e) {
        if (e.target.tagName !== 'INPUT') return;
        
        if (e.target.classList.contains('item-title-case')) {
            let p = e.target.selectionStart;
            let preposicoes = ['de', 'da', 'do', 'das', 'dos', 'e'];
            let words = e.target.value.toLowerCase().split(' ');
            for (let i = 0; i < words.length; i++) {
                if (words[i].length > 0 && !(i !== 0 && preposicoes.includes(words[i]))) {
                    words[i] = words[i][0].toUpperCase() + words[i].substr(1);
                }
            }
            e.target.value = words.join(' ');
            e.target.setSelectionRange(p, p);
        } else if (!e.target.classList.contains('item-desc') && !e.target.classList.contains('item-data') && !e.target.classList.contains('item-valor') && (e.target.type === 'text' || e.target.hasAttribute('list'))) {
            if (e.target.value !== e.target.value.toUpperCase()) {
                let p = e.target.selectionStart; 
                e.target.value = e.target.value.toUpperCase(); 
                try { e.target.setSelectionRange(p, p); } catch(err){}
            }
        }
    });

    // --- LIMPAR CAMPOS ---
    function limparCampos() {
        if(!confirm("Limpar todos os campos?")) return;
        document.getElementById('orcamentoForm').reset();
        document.getElementById('itemsContainer').innerHTML = '';
        document.getElementById('valorTotal').innerText = '0,00';
        document.getElementById('meios-display').innerText = 'Selecione...';
        document.getElementById('meios-display').classList.remove('preenchido');
        document.querySelectorAll('#meios-lista input').forEach(cb => cb.checked = false);
        linkPdfGerado = ""; nomeArquivoGerado = "";
        adicionarLinhaItem(); preencherData();
    }

    window.onload = () => { preencherData(); buscarAgencias(); buscarMenus(); adicionarLinhaItem(); };

    function preencherData() {
        const h = new Date(); document.getElementById('dataAtual').value = `${String(h.getDate()).padStart(2,'0')}/${String(h.getMonth()+1).padStart(2,'0')}/${h.getFullYear()}`;
    }

    function buscarMenus() {
        fetch(`${URL_SCRIPT}?rota=getDropdowns`).then(r=>r.json()).then(d => {
            preencherDatalist('lista-praca', d.praca); preencherDatalist('lista-periodo', d.periodo);
            preencherDatalist('lista-condicao', d.condicao); preencherDatalist('lista-prazoPag', d.prazoPag);
            preencherDatalist('lista-validade', d.validade); preencherDatalist('lista-peca', d.peca);
            preencherDatalist('lista-desc', d.descricoes); preencherDatalist('lista-responsavel', d.responsavel);
            meiosCadastrados = d.meios || []; renderizarMeios();
        });
    }

    function preencherDatalist(id, arr) { if(arr) document.getElementById(id).innerHTML = arr.map(i => `<option value="${i}">`).join(''); }

    function buscarAgencias(sel='') {
        document.getElementById('agencia').placeholder = "Aguarde...";
        fetch(`${URL_SCRIPT}?rota=getAgencias`).then(r=>r.json()).then(d => {
            preencherDatalist('lista-agencias', d); document.getElementById('agencia').placeholder = "Selecione...";
            if(sel) { document.getElementById('agencia').value = sel; carregarClientes(); }
        });
    }

    function carregarClientes(sel='') {
        const ag = document.getElementById('agencia').value;
        const cliInput = document.getElementById('cliente');
        const cliData = document.getElementById('lista-clientes');
        
        if (!sel) cliInput.value = '';
        if (!ag) { cliInput.placeholder = 'Selecione a agência'; cliData.innerHTML = ''; return; }
        
        cliInput.placeholder = 'Buscando clientes...';
        fetch(`${URL_SCRIPT}?rota=getClientes&agencia=${encodeURIComponent(ag)}`).then(r => r.json()).then(d => {
            if(!d || d.length === 0) { cliInput.placeholder = "Nenhum cliente na pasta."; cliData.innerHTML = ''; } 
            else { preencherDatalist('lista-clientes', d); cliInput.placeholder = "Selecione o cliente..."; if(sel) cliInput.value = sel; }
        }).catch(err => { cliInput.placeholder = "Erro"; alert("Erro na conexão."); });
    }

    function criarNovaAgencia() {
        let nomeAgencia = prompt("Digite o nome da NOVA AGÊNCIA:");
        if (!nomeAgencia) return; nomeAgencia = nomeAgencia.trim().toUpperCase();
        document.getElementById('agencia').value = ''; document.getElementById('agencia').placeholder = "Criando pasta...";
        fetch(`${URL_SCRIPT}?rota=criarAgencia&nome=${encodeURIComponent(nomeAgencia)}`).then(res => res.json()).then(res => { 
            if (Array.isArray(res) || !res.nome) return alert("Erro no servidor.");
            if (res.erro) return alert("Erro: " + res.erro); 
            alert("Agência criada!"); buscarAgencias(res.nome); 
        });
    }

    function criarNovoCliente() {
        const ag = document.getElementById('agencia').value;
        if (!ag) return alert("Selecione uma Agência primeiro!");
        let nomeCliente = prompt(`Digite o nome do NOVO CLIENTE:\n${ag}`);
        if (!nomeCliente) return; nomeCliente = nomeCliente.trim().toUpperCase();
        document.getElementById('cliente').value = ''; document.getElementById('cliente').placeholder = "Criando pasta...";
        fetch(`${URL_SCRIPT}?rota=criarCliente&agencia=${encodeURIComponent(ag)}&nome=${encodeURIComponent(nomeCliente)}`).then(res => res.json()).then(res => { 
            if (Array.isArray(res) || !res.nome) return alert("Erro no servidor.");
            if (res.erro) return alert("Erro: " + res.erro); 
            alert("Cliente criado!"); carregarClientes(res.nome); 
        });
    }

    // --- ABRIR E VER PASTA (MODAIS) ---
    function abrirModalArquivos(acao) {
        const ag = document.getElementById('agencia').value; const cli = document.getElementById('cliente').value;
        if(!ag || !cli) return alert("Selecione Agência e Cliente primeiro.");
        
        document.getElementById('modalArquivos').style.display = 'flex';
        document.getElementById('modalList').innerHTML = 'Buscando arquivos no Drive...';
        document.getElementById('modalTitle').innerText = acao === 'abrir' ? 'Importar Planilha (Snapshot)' : 'Conteúdo da Pasta';

        fetch(`${URL_SCRIPT}?rota=listarArquivosCliente&agencia=${encodeURIComponent(ag)}&cliente=${encodeURIComponent(cli)}`)
        .then(r=>r.json()).then(res => {
            if(res.erro) return document.getElementById('modalList').innerHTML = `<p style="color:red">Erro: ${res.erro}</p>`;
            if(res.arquivos.length === 0) return document.getElementById('modalList').innerHTML = `<p>Nenhum arquivo encontrado.</p>`;
            
            let html = acao === 'ver' ? `<a href="${res.urlPasta}" target="_blank" style="display:block; margin-bottom:15px; color:var(--blue-btn); font-weight:bold;">🔗 ABRIR PASTA NO G-DRIVE</a>` : '';
            res.arquivos.forEach(f => {
                let icon = f.tipo.includes('pdf') ? '📄 PDF ' : '📊 XLS ';
                if(acao === 'abrir') {
                    if(!f.tipo.includes('pdf')) html += `<div class="file-item" onclick="carregarOrcamentoDrive('${f.id}')">${icon} ${f.nome}</div>`;
                } else {
                    html += `<div class="file-item" onclick="window.open('${f.url}', '_blank')">${icon} ${f.nome}</div>`;
                }
            });
            document.getElementById('modalList').innerHTML = html || '<p>Nenhuma planilha compatível encontrada.</p>';
        });
    }

    function fecharModal() { document.getElementById('modalArquivos').style.display = 'none'; }

    // --- CARREGAR DADOS NA TELA (CORRIGIDO PARA MOEDA) ---
    function carregarOrcamentoDrive(id) {
        document.getElementById('modalList').innerHTML = 'Lendo planilha... Aguarde (pode demorar).';
        fetch(`${URL_SCRIPT}?rota=carregarOrcamento&id=${id}`).then(r=>r.json()).then(res => {
            if(res.erro) return alert("Erro ao carregar: " + res.erro);
            let d = res.dados;
            document.getElementById('numOrcamento').value = d.numOrcamento;
            document.getElementById('campanha').value = d.campanha;
            document.getElementById('praca').value = d.praca;
            document.getElementById('periodo').value = d.periodo;
            document.getElementById('condicao').value = d.condicao;
            document.getElementById('prazoPag').value = d.prazoPag;
            document.getElementById('validade').value = d.validade;
            document.getElementById('prazoEnt').value = d.prazoEnt;
            if(d.data) document.getElementById('dataAtual').value = d.data;

            document.getElementById('meios').value = d.meios;
            document.getElementById('meios-display').innerText = d.meios || 'Selecione...';
            if(d.meios) document.getElementById('meios-display').classList.add('preenchido');
            
            document.getElementById('itemsContainer').innerHTML = '';
            itemCount = 0;
            // Popula os itens formatando o dinheiro corretamente
            d.itens.forEach(it => { adicionarLinhaItem(it.peca, it.desc, floatParaMoeda(it.valor), it.qtde); });
            calcularTotal(); fecharModal();
            alert("Dados carregados com sucesso! Verifique a caixa 'Orçamento de Ajuste' se for gerar uma nova versão.");
        });
    }

    // --- ITENS (CORRIGIDO PARA MÁSCARA) ---
    let itemCount = 0;
    function adicionarLinhaItem(p='', d='', v='', q='1') {
        if (itemCount >= 9) return alert("Limite de 9 itens.");
        const div = document.createElement('div'); div.className = 'item-row';
        div.innerHTML = `
            <button type="button" class="btn-remove-item" onclick="this.parentElement.remove(); calcularTotal();">X</button>
            <div class="input-group"><label>Peça / Duração</label><input list="lista-peca" class="item-peca" value="${p}" required></div>
            <div class="input-group"><label>Descrição</label><input list="lista-desc" class="item-desc" value="${d}" required></div>
            <div style="display: flex; gap: 10px;">
                <div class="input-group" style="flex:2;">
                    <label>Valor Unit. (R$)</label>
                    <input type="text" class="item-valor" value="${v}" placeholder="1.250,00" oninput="formatarMoeda(this)" required>
                </div>
                <div class="input-group" style="flex:1;">
                    <label>Qtde.</label>
                    <input type="number" class="item-qtde" value="${q}" oninput="calcularTotal()" required>
                </div>
            </div>`;
        document.getElementById('itemsContainer').appendChild(div);
        itemCount++; calcularTotal();
    }
    
    // --- CALCULA TOTAL DESMASCARANDO ---
    function calcularTotal() {
        let t = 0;
        document.querySelectorAll('.item-row').forEach(r => {
            let valorFloat = parseMoeda(r.querySelector('.item-valor').value);
            let qtde = parseInt(r.querySelector('.item-qtde').value) || 0;
            t += (valorFloat * qtde);
        });
        document.getElementById('valorTotal').innerText = t.toLocaleString('pt-BR', {minimumFractionDigits:2});
    }

    // --- MEIOS ---
    function toggleMeios() { const dd = document.getElementById('meios-dropdown'); dd.style.display = dd.style.display === 'block' ? 'none' : 'block'; }
    function renderizarMeios() { document.getElementById('meios-lista').innerHTML = meiosCadastrados.map(m => `<label class="meio-checkbox-item"><input type="checkbox" value="${m}" onchange="atualizarCampoMeios()"> ${m}</label>`).join(''); }
    function atualizarCampoMeios() {
        const marc = Array.from(document.querySelectorAll('#meios-lista input:checked')).map(cb => cb.value);
        const disp = document.getElementById('meios-display');
        if(!marc.length) { disp.innerText = 'Selecione...'; disp.classList.remove('preenchido'); document.getElementById('meios').value=''; }
        else { let txt = marc.join(', ') + '.'; disp.innerText = txt; disp.classList.add('preenchido'); document.getElementById('meios').value = txt; }
    }
    function adicionarMeio() {
        const v = document.getElementById('novo-meio').value.trim().toUpperCase();
        if(v && !meiosCadastrados.includes(v)) { meiosCadastrados.push(v); renderizarMeios(); fetch(`${URL_SCRIPT}?rota=salvarOpcaoNova&celula=B19&valor=${encodeURIComponent(v)}`); }
        document.getElementById('novo-meio').value = '';
    }

    // --- ENVIOS ---
    function coletarDadosForm() {
        const itens = [];
        document.querySelectorAll('.item-row').forEach(r => {
            itens.push({ 
                peca: r.querySelector('.item-peca').value.toUpperCase(), 
                desc: r.querySelector('.item-desc').value, 
                valor: parseMoeda(r.querySelector('.item-valor').value), // Manda o numero limpo pro Drive
                qtde: r.querySelector('.item-qtde').value 
            });
        });
        return {
            agencia: document.getElementById('agencia').value.toUpperCase(), cliente: document.getElementById('cliente').value.toUpperCase(),
            campanha: document.getElementById('campanha').value.toUpperCase(), praca: document.getElementById('praca').value.toUpperCase(),
            periodo: document.getElementById('periodo').value.toUpperCase(), meios: document.getElementById('meios').value,
            condicao: document.getElementById('condicao').value.toUpperCase(), prazoPag: document.getElementById('prazoPag').value.toUpperCase(),
            validade: document.getElementById('validade').value.toUpperCase(), prazoEnt: document.getElementById('prazoEnt').value.toUpperCase(),
            dataAtual: document.getElementById('dataAtual').value, nomeContato: document.getElementById('nomeContato').value,
            responsavel: document.getElementById('responsavel').value.toUpperCase(), isAjuste: document.getElementById('isAjuste').checked,
            numBase: document.getElementById('numOrcamento').value, itens: itens
        };
    }

    function gerarDocumentoPDF() {
        if(!document.getElementById('orcamentoForm').checkValidity()) return alert("Preencha os campos obrigatórios primeiro.");
        const btn = document.getElementById('btnGerarPdf'); btn.innerText = "GERANDO... AGUARDE"; btn.disabled = true;
        let fd = coletarDadosForm(); fd.rota = 'gerarPDF';
        
        fetch(URL_SCRIPT, { method:'POST', body: JSON.stringify(fd) }).then(r=>r.json()).then(res => {
            btn.innerText = "GERAR ORÇAMENTO (PDF)"; btn.disabled = false;
            if(res.erro) return alert("Erro: " + res.erro);
            
            document.getElementById('numOrcamento').value = res.orcNum;
            linkPdfGerado = res.url; nomeArquivoGerado = res.fileName; 
            
            if(confirm("PDF Gerado com sucesso!\nNº: " + res.orcNum + "\n\nDeseja abrir o PDF agora?")) window.open(res.url, '_blank');
        }).catch(e=>{ btn.innerText = "GERAR ORÇAMENTO (PDF)"; btn.disabled = false; alert("Falha na conexão."); });
    }

    function enviarViaEmail() {
        if(!nomeArquivoGerado) return alert("Gere o PDF primeiro antes de enviar por e-mail.");
        const btn = document.getElementById('btnEmail'); btn.innerText = "CRIANDO RASCUNHO..."; btn.disabled = true;
        let fd = coletarDadosForm(); fd.rota = 'enviarEmail'; fd.fileName = nomeArquivoGerado;
        
        fetch(URL_SCRIPT, { method:'POST', body: JSON.stringify(fd) }).then(r=>r.json()).then(res => {
            btn.innerText = "ENVIAR PDF VIA GMAIL (RASCUNHO)"; btn.disabled = false;
            if(res.erro) return alert("Erro: " + res.erro);
            alert("Rascunho criado no Gmail da Protom com sucesso!");
        });
    }

    // ALTERADO PARA ABRIR O WHATSAPP COM O LINK (RESOLVE O PROBLEMA DE APLICATIVO ESCONDIDO)
    function compartilharPDF() {
        if(!linkPdfGerado) return alert("Gere o PDF primeiro para obter o link.");
        
        let cli = document.getElementById('cliente').value.split(' - ')[1] || "Cliente";
        let camp = document.getElementById('campanha').value;
        let msg = `Olá! Segue o link do orçamento da campanha *${camp}* para a *${cli}*.\n\n📄 *Acessar PDF:* ${linkPdfGerado}`;
        
        // Abre direto no WhatsApp oficial da Protom
        window.open(`https://wa.me/5571999660529?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>
</body>
</html>
