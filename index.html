<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Protom - Orçamentos</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --yellow-main: #FFCB05;
            --yellow-light: #FFFBF0;
            --orange-main: #F47920;
            --orange-light: #FFF5EC;
            --text-dark: #333333;
            --text-gray: #666666;
            --border-color: #E0E0E0;
            --green-btn: #4CAF50;
            --green-btn-hover: #45a049;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        
        body { background-color: #f7f7f7; color: var(--text-dark); display: flex; justify-content: center; }

        .app-container {
            width: 100%;
            max-width: 480px; 
            background-color: #ffffff;
            min-height: 100vh;
            padding: 20px 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 24px; color: var(--yellow-main); }
        .header h1 span { color: var(--orange-main); }
        .header p { font-size: 12px; color: var(--text-gray); }

        .card {
            border-radius: 12px;
            padding: 20px 15px;
            margin-bottom: 20px;
            position: relative;
        }
        
        .card-yellow { border: 2px solid var(--yellow-main); background-color: var(--yellow-light); }
        .card-orange { border: 2px solid var(--orange-main); background-color: var(--orange-light); }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .card-yellow .card-title { color: var(--text-dark); }
        .card-orange .card-title { color: var(--text-dark); }

        .input-group {
            position: relative;
            margin-bottom: 15px;
            background: transparent;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 5px;
            margin-left: 5px;
        }

        .input-row { display: flex; gap: 8px; }

        .input-group input, .input-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--yellow-main);
            border-radius: 8px;
            font-size: 14px;
            background-color: #fff;
            outline: none;
            flex: 1;
        }
        
        .input-group input[type="text"], 
        .input-group input[list] {
            text-transform: uppercase;
        }

        .card-orange .input-group input, .card-orange .input-group select {
            border-color: var(--orange-main);
        }

        .input-group input:focus, .input-group select:focus {
            box-shadow: 0 0 0 2px rgba(255, 203, 5, 0.3);
        }

        .btn-small {
            background-color: var(--green-btn);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            width: 100px; 
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            text-align: center;
            transition: background-color 0.2s;
        }

        .btn-small:active {
            background-color: var(--green-btn-hover);
            transform: translateY(2px);
        }

        .item-row {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
        }
        .btn-add {
            background: transparent;
            color: var(--orange-main);
            border: 2px dashed var(--orange-main);
            padding: 10px;
            width: 100%;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .btn-primary {
            background-color: var(--yellow-main);
            color: #fff;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 6px rgba(255, 203, 5, 0.3);
            margin-top: 10px;
        }
        
        .btn-primary:active { transform: translateY(2px); }
        .btn-primary:disabled { background-color: #ccc; cursor: not-allowed; box-shadow: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>📢 <span>PRO</span>TOM</h1>
        <p>Projetos Sonoros - Gerador de Orçamentos</p>
    </div>

    <form id="orcamentoForm">
        
        <div class="card card-yellow">
            <h2 class="card-title">1. Informações Básicas</h2>
            
            <div class="input-group">
                <label>Agência</label>
                <div class="input-row">
                    <input list="lista-agencias" id="agencia" placeholder="Carregando agências..." required onchange="carregarClientes()">
                    <button type="button" class="btn-small" onclick="criarNovaAgencia()">+ Agência</button>
                </div>
                <datalist id="lista-agencias"></datalist>
            </div>

            <div class="input-group">
                <label>Cliente</label>
                <div class="input-row">
                    <input list="lista-clientes" id="cliente" placeholder="Selecione uma agência primeiro" required>
                    <button type="button" class="btn-small" onclick="criarNovoCliente()">+ Cliente</button>
                </div>
                <datalist id="lista-clientes"></datalist>
            </div>

            <div class="input-group">
                <label>Campanha</label>
                <input type="text" id="campanha" placeholder="Ex: TOP CURSOS 2026.1" required>
            </div>
        </div>

        <div class="card card-orange">
            <h2 class="card-title">2. Veiculação</h2>
            
            <div class="input-group">
                <label>Praça</label>
                <input list="lista-praca" id="praca" placeholder="Carregando..." required>
                <datalist id="lista-praca"></datalist>
            </div>
            <div class="input-group">
                <label>Período</label>
                <input list="lista-periodo" id="periodo" placeholder="Carregando..." required>
                <datalist id="lista-periodo"></datalist>
            </div>
            <div class="input-group">
                <label>Meios (Pode digitar vários com vírgula)</label>
                <input list="lista-meios" id="meios" placeholder="Carregando..." required>
                <datalist id="lista-meios"></datalist>
            </div>
        </div>

        <div class="card card-yellow">
            <h2 class="card-title">3. Itens do Orçamento</h2>
            
            <div id="itemsContainer">
                <div class="item-row">
                    <div class="input-group"><label>Peça / Duração</label><input type="text" class="item-peca" placeholder="Ex: Spot 30s" required></div>
                    <div class="input-group"><label>Descrição</label><input type="text" class="item-desc" placeholder="Ex: Locução Standard..." required></div>
                    <div style="display: flex; gap: 10px;">
                        <div class="input-group" style="flex: 2;"><label>Valor Unit. (R$)</label><input type="number" step="0.01" class="item-valor" placeholder="1250.00" required></div>
                        <div class="input-group" style="flex: 1;"><label>Qtde.</label><input type="number" class="item-qtde" value="1" required></div>
                    </div>
                </div>
            </div>
            <button type="button" class="btn-add" id="btnAddItem">+ ADICIONAR ITEM (Max 9)</button>
        </div>

        <div class="card card-orange">
            <h2 class="card-title">4. Condições Comerciais</h2>
            
            <div class="input-group">
                <label>Condição de Pagamento</label>
                <input list="lista-condicao" id="condicao" placeholder="Carregando..." required>
                <datalist id="lista-condicao"></datalist>
            </div>
            <div class="input-group">
                <label>Prazo de Pagamento</label>
                <input list="lista-prazoPag" id="prazoPag" placeholder="Carregando..." required>
                <datalist id="lista-prazoPag"></datalist>
            </div>
            <div class="input-group">
                <label>Validade da Proposta</label>
                <input list="lista-validade" id="validade" placeholder="Carregando..." required>
                <datalist id="lista-validade"></datalist>
            </div>
            <div class="input-group">
                <label>Prazo de Entrega</label>
                <input type="text" id="prazoEnt" value="A COMBINAR" required>
            </div>
        </div>

        <button type="submit" class="btn-primary" id="btnSubmit">GERAR ORÇAMENTO</button>

    </form>
</div>

<script>
    const URL_SCRIPT = 'https://script.google.com/macros/s/AKfycbzfeflsrPywqxil3eoPHKzjMdSKh_cTKVXQCLEkZLySmGaOrXmVIv9PNIHYxshuv-40/exec'; 

    // --- GARANTIR TEXTOS MAIÚSCULOS ---
    document.addEventListener('input', function(e) {
        if (e.target.tagName === 'INPUT' && (e.target.type === 'text' || e.target.hasAttribute('list'))) {
            let start = e.target.selectionStart;
            let end = e.target.selectionEnd;
            e.target.value = e.target.value.toUpperCase();
            e.target.setSelectionRange(start, end);
        }
    });

    // --- CARREGAMENTO INICIAL (AGÊNCIAS E MENUS INTELIGENTES) ---
    window.onload = () => {
        buscarAgencias();
        buscarMenus();
    };

    function buscarMenus() {
        fetch(`${URL_SCRIPT}?rota=getDropdowns`)
            .then(res => res.json())
            .then(dados => {
                preencherDatalist('lista-praca', dados.praca);
                document.getElementById('praca').placeholder = "Ex: BAHIA E SERGIPE";

                preencherDatalist('lista-periodo', dados.periodo);
                document.getElementById('periodo').placeholder = "Ex: 1 MÊS";

                preencherDatalist('lista-meios', dados.meios);
                document.getElementById('meios').placeholder = "Ex: RÁDIO, SPOT";

                preencherDatalist('lista-condicao', dados.condicao);
                document.getElementById('condicao').placeholder = "Ex: 1X SEM JUROS";

                preencherDatalist('lista-prazoPag', dados.prazoPag);
                document.getElementById('prazoPag').placeholder = "Ex: 30 DIAS";

                preencherDatalist('lista-validade', dados.validade);
                document.getElementById('validade').placeholder = "Ex: 10 DIAS";
            });
    }

    function preencherDatalist(idLista, arrayOpcoes) {
        if (!arrayOpcoes) return;
        let html = '';
        arrayOpcoes.forEach(item => html += `<option value="${item}">`);
        document.getElementById(idLista).innerHTML = html;
    }

    function buscarAgencias(selecionarNome = '') {
        document.getElementById('agencia').placeholder = "Carregando agências...";
        fetch(`${URL_SCRIPT}?rota=getAgencias`)
            .then(res => res.json())
            .then(dados => {
                let html = '';
                dados.forEach(n => html += `<option value="${n}">`);
                document.getElementById('lista-agencias').innerHTML = html;
                document.getElementById('agencia').placeholder = "Digite ou selecione a agência...";
                if(selecionarNome) {
                    document.getElementById('agencia').value = selecionarNome;
                    carregarClientes();
                }
            });
    }

    function carregarClientes(selecionarNome = '') {
        const ag = document.getElementById('agencia').value;
        const cliInput = document.getElementById('cliente');
        const cliData = document.getElementById('lista-clientes');
        
        if (!selecionarNome) cliInput.value = '';
        if (!ag) {
            cliInput.placeholder = 'Selecione uma agência primeiro';
            cliData.innerHTML = '';
            return;
        }

        cliInput.placeholder = 'Buscando clientes no Drive...';
        fetch(`${URL_SCRIPT}?rota=getClientes&agencia=${encodeURIComponent(ag)}`)
            .then(res => res.json())
            .then(dados => {
                let html = '';
                dados.forEach(n => html += `<option value="${n}">`);
                cliData.innerHTML = html;
                cliInput.placeholder = "Digite ou selecione o cliente...";
                if(selecionarNome) cliInput.value = selecionarNome;
            });
    }

    // --- CRIAÇÃO DE AGÊNCIA E CLIENTE ---
    function criarNovaAgencia() {
        let nomeAgencia = prompt("Digite o nome da NOVA AGÊNCIA:");
        if (!nomeAgencia) return;
        
        nomeAgencia = nomeAgencia.trim().toUpperCase();
        document.getElementById('agencia').value = '';
        document.getElementById('agencia').placeholder = "Criando pasta...";

        fetch(`${URL_SCRIPT}?rota=criarAgencia&nome=${encodeURIComponent(nomeAgencia)}`)
        .then(res => res.json())
        .then(res => {
            if (res.erro) { alert("Erro: " + res.erro); return; }
            alert("Agência criada com sucesso!");
            buscarAgencias(res.nome);
        });
    }

    function criarNovoCliente() {
        const ag = document.getElementById('agencia').value;
        if (!ag) { alert("Selecione uma Agência primeiro!"); return; }

        let nomeCliente = prompt(`Digite o nome do NOVO CLIENTE:\n${ag}`);
        if (!nomeCliente) return;

        nomeCliente = nomeCliente.trim().toUpperCase();
        document.getElementById('cliente').value = '';
        document.getElementById('cliente').placeholder = "Criando pasta...";

        fetch(`${URL_SCRIPT}?rota=criarCliente&agencia=${encodeURIComponent(ag)}&nome=${encodeURIComponent(nomeCliente)}`)
        .then(res => res.json())
        .then(res => {
            if (res.erro) { alert("Erro: " + res.erro); return; }
            alert("Cliente criado com sucesso!");
            carregarClientes(res.nome);
        });
    }

    // --- LÓGICA DE ITENS E SUBMISSÃO ---
    const btnAddItem = document.getElementById('btnAddItem');
    const itemsContainer = document.getElementById('itemsContainer');
    let itemCount = 1;

    btnAddItem.addEventListener('click', () => {
        if (itemCount >= 9) { alert("Limite máximo: 9 itens."); return; }
        const newItem = document.createElement('div');
        newItem.className = 'item-row';
        newItem.innerHTML = `
            <div class="input-group"><label>Peça / Duração</label><input type="text" class="item-peca" required></div>
            <div class="input-group"><label>Descrição</label><input type="text" class="item-desc" required></div>
            <div style="display: flex; gap: 10px;">
                <div class="input-group" style="flex: 2;"><label>Valor Unit. (R$)</label><input type="number" step="0.01" class="item-valor" required></div>
                <div class="input-group" style="flex: 1;"><label>Qtde.</label><input type="number" class="item-qtde" value="1" required></div>
            </div>`;
        itemsContainer.appendChild(newItem);
        itemCount++;
    });

    document.getElementById('orcamentoForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btnSubmit = document.getElementById('btnSubmit');
        btnSubmit.innerText = 'ENVIANDO PARA O DRIVE...';
        btnSubmit.disabled = true;

        const itens = [];
        document.querySelectorAll('.item-row').forEach(row => {
            itens.push({
                peca: row.querySelector('.item-peca').value.toUpperCase(),
                desc: row.querySelector('.item-desc').value.toUpperCase(),
                valor: row.querySelector('.item-valor').value,
                qtde: row.querySelector('.item-qtde').value
            });
        });

        const formData = {
            rota: 'gerarPDF', 
            agencia: document.getElementById('agencia').value.toUpperCase(),
            cliente: document.getElementById('cliente').value.toUpperCase(),
            campanha: document.getElementById('campanha').value.toUpperCase(),
            praca: document.getElementById('praca').value.toUpperCase(),
            periodo: document.getElementById('periodo').value.toUpperCase(),
            meios: document.getElementById('meios').value.toUpperCase(),
            condicao: document.getElementById('condicao').value.toUpperCase(),
            prazoPag: document.getElementById('prazoPag').value.toUpperCase(),
            validade: document.getElementById('validade').value.toUpperCase(),
            prazoEnt: document.getElementById('prazoEnt').value.toUpperCase(),
            itens: itens
        };

        fetch(URL_SCRIPT, { method: 'POST', body: JSON.stringify(formData) })
        .then(res => res.json())
        .then(response => {
            alert('Orçamento enviado com sucesso! Se digitou palavras novas, elas já foram salvas na planilha.');
            btnSubmit.innerText = 'GERAR ORÇAMENTO';
            btnSubmit.disabled = false;
        }).catch(err => {
            alert("Requisição enviada ao servidor.");
            btnSubmit.innerText = 'GERAR ORÇAMENTO';
            btnSubmit.disabled = false;
        });
    });
</script>
</body>
</html>
